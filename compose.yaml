services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
      POSTGRES_DB: ${POSTGRES_DB:-memory_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-local-qdrant-key}
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      BACKUP_DIR: ${BACKUP_DIR:-/var/lib/developer-memory-os/backups}
      BACKUP_TARGET_HOST: ${BACKUP_TARGET_HOST:-backup@example.internal}
      DATABASE_URL: postgres://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD:-memory}@postgres:5432/${POSTGRES_DB:-memory_os}
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-me}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      PORT: ${PORT:-8787}
      POSTGRES_DB: ${POSTGRES_DB:-memory_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-local-qdrant-key}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-memory_chunks_v1}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - backup_data:/var/lib/developer-memory-os/backups
    ports:
      - "127.0.0.1:${PORT:-8787}:${PORT:-8787}"

volumes:
  backup_data:
  postgres_data:
  qdrant_storage:
