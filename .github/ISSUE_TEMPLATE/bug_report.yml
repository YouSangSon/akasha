name: Bug report
description: Report a bug in Akasha
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the
        details below — the more concrete the reproduction, the faster
        we can fix.

        **Don't report security vulnerabilities here.** See
        [SECURITY.md](../SECURITY.md) for the private reporting channel.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
      placeholder: "compact_memory with dryRun=false returns 500 instead of archiving records"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible example. Include curl commands if HTTP-related, or MCP tool input if MCP-related.
      placeholder: |
        1. Run `./install.sh` with default config
        2. POST `/v1/memory` with body `{...}`
        3. POST `/v1/memory/compact` with body `{"dryRun": false}`
        4. Observe 500 in response
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "200 with archivedIds populated"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message and any relevant log output (`docker compose logs app`).
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `git rev-parse HEAD`, or release tag.
      placeholder: "v1.0.0 / abcd1234"
    validations:
      required: true

  - type: dropdown
    id: embedding-provider
    attributes:
      label: EMBEDDING_PROVIDER
      options:
        - openai
        - local
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - "Local dev (./install.sh + docker compose)"
        - "Compose on a remote host"
        - "Custom (external Postgres / Qdrant)"
        - "MCP only (no HTTP server)"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `node -v`, `docker --version`, OS, anything else relevant.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight
      options:
        - label: I checked [docs/troubleshooting.md](../../docs/troubleshooting.md) for known issues.
          required: true
        - label: I confirmed this isn't a configuration issue (env vars, .env file).
          required: true
        - label: I am NOT reporting a security vulnerability (those go to [SECURITY.md](../../SECURITY.md)).
          required: true
