name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow concurrent builds on different PRs but cancel stale ones on the
# same PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: typecheck + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        # Skip the onnxruntime-node CUDA/GPU binary download: CI runs CPU-only,
        # and that download hits GitHub releases (flaky — has 500'd mid-run).
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Typecheck
        run: npm run typecheck

      - name: Test (non-PG suites)
        # The 3 PG-dependent test files skip gracefully without Postgres on
        # 5432; the integration coverage runs in a separate job below where
        # we actually bring up Postgres.
        run: npm test

  pg-integration:
    name: pg integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memory
          POSTGRES_PASSWORD: memory
          POSTGRES_DB: memory_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memory -d memory_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        # Skip the onnxruntime-node CUDA/GPU binary download: CI runs CPU-only,
        # and that download hits GitHub releases (flaky — has 500'd mid-run).
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Run PG-dependent suites
        env:
          POSTGRES_USER: memory
          POSTGRES_PASSWORD: memory
          POSTGRES_DB: memory_os
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          DATABASE_URL: postgres://memory:memory@127.0.0.1:5432/memory_os
        run: npm test

  pgvector-integration:
    name: pgvector integration tests
    runs-on: ubuntu-latest
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memory
          POSTGRES_PASSWORD: memory
          POSTGRES_DB: memory_pgv
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U memory -d memory_pgv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        # Skip the onnxruntime-node CUDA/GPU binary download: CI runs CPU-only,
        # and that download hits GitHub releases (flaky — has 500'd mid-run).
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Run pgvector integration suite
        env:
          PGVECTOR_TEST_URL: postgres://memory:memory@127.0.0.1:5433/memory_pgv
        run: npx vitest run tests/vector/pgvector-index.integration.test.ts
